<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Client Portal · Creative Juice Agency</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#17181a;--bg2:#1e1f21;--bg3:#26272a;--bg4:#2e3034;
  --text:#eaeaea;--text2:#9ea1a6;--text3:#5e6166;
  --gold:#eaeaea;--gold-dim:rgba(234,234,234,0.08);--gold-dim2:rgba(234,234,234,0.16);
  --green:#4caf7a;--green-dim:rgba(76,175,122,0.12);
  --blue:#667eea;--purple:#9561e2;--red:#e05a5a;--red-dim:rgba(224,90,90,0.12);
  --amber:#d4a65a;--amber-dim:rgba(212,166,90,0.12);
  --border:#33363a;--border2:#40434a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.5}

/* Login screen */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:420px;width:100%}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:600;color:var(--gold);text-align:center;margin-bottom:6px;letter-spacing:-0.02em}
.login-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);text-align:center;margin-bottom:32px}
.login-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:8px}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:14px 16px;font-family:'DM Mono',monospace;font-size:16px;letter-spacing:.14em;text-align:center;outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--gold)}
.login-btn{width:100%;margin-top:16px;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:0.9}
.login-btn:disabled{opacity:0.5;cursor:not-allowed}
.login-error{color:var(--red);font-size:11px;text-align:center;margin-top:12px;font-family:'DM Mono',monospace}

/* Portal shell */
.portal-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.portal-brand{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:var(--gold);letter-spacing:-0.02em}
.portal-brand-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-top:1px}
.portal-user{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text2)}
.portal-logout{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:6px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:color .15s}
.portal-logout:hover{color:var(--gold);border-color:var(--gold)}

/* Top-level nav tabs */
.portal-nav-item{background:transparent;border:none;color:var(--text3);padding:14px 20px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-weight:500}
.portal-nav-item:hover{color:var(--text2)}
.portal-nav-item.active{color:var(--text);border-bottom-color:var(--gold)}

/* Dashboard */
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.metric-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.metric-value{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:600;color:var(--text);line-height:1;letter-spacing:-0.025em}
.metric-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:6px}

.portal-content{max-width:1400px;margin:0 auto;padding:28px}
.portal-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}

/* Project cards on home */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;margin-bottom:36px}
.proj-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;cursor:pointer;transition:all .15s}
.proj-card:hover{border-color:var(--gold);background:var(--bg3)}
.proj-card-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.02em}
.proj-card-dates{font-size:11px;color:var(--text3);margin-bottom:16px;font-family:'DM Mono',monospace}
.proj-card-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.proj-stat{background:var(--bg);border-radius:8px;padding:10px 12px}
.proj-stat-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.proj-stat-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--text)}
.proj-progress{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-bottom:4px}
.proj-progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:3px;transition:width .3s}
.proj-progress-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-align:right}

/* Back link */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-bottom:18px;background:none;border:none}
.back-link:hover{color:var(--gold)}

/* Project detail header */
.pd-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:26px 28px;margin-bottom:22px}
.pd-title{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.025em}
.pd-dates{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-bottom:20px}
.pd-progress-bar{height:10px;background:var(--bg4);border-radius:5px;overflow:hidden;margin-bottom:6px}
.pd-progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:5px;transition:width .3s}

/* View tabs */
.view-tabs{display:flex;gap:4px;background:var(--bg2);padding:4px;border-radius:10px;margin-bottom:20px;width:fit-content}
.view-tab{background:transparent;border:none;color:var(--text3);padding:8px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:7px;display:flex;align-items:center;gap:6px;transition:all .15s}
.view-tab.active{background:var(--bg4);color:var(--gold)}
.view-tab:not(.active):hover{color:var(--text2)}

/* Deliverable list */
.deliv-list{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.deliv-row{display:grid;grid-template-columns:1fr 140px 120px 150px;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center}
.deliv-row:last-child{border-bottom:none}
.deliv-name{font-size:14px;font-weight:500;color:var(--text)}
.deliv-type{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px}
.status-chip{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;padding:4px 9px;border-radius:4px;display:inline-block}
.status-planned{background:rgba(234,234,234,0.08);color:var(--text3)}
.status-in_progress{background:rgba(212,166,90,0.14);color:var(--amber)}
.status-in_review{background:rgba(102,126,234,0.14);color:var(--blue)}
.status-published{background:rgba(76,175,122,0.14);color:var(--green)}
.status-cancelled{background:rgba(224,90,90,0.1);color:var(--red)}

/* Kanban */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;min-height:400px}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;min-width:0}
.kanban-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.kanban-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.kanban-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);font-weight:600}
.kanban-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;transition:border-color .15s}
.kanban-card:hover{border-color:var(--border2)}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-head{background:var(--bg);padding:10px 12px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center}
.cal-cell{background:var(--bg2);min-height:100px;padding:8px;border-top:1px solid var(--border)}
.cal-cell.today{background:var(--bg3);box-shadow:inset 0 0 0 1px var(--gold)}
.cal-cell.other{opacity:0.3}
.cal-daynum{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:6px}
.cal-daynum.today{color:var(--gold);font-weight:700}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:-0.02em}
.empty-sub{font-size:12px}

/* Mobile */
@media (max-width:720px){
  .portal-content{padding:18px}
  .portal-header{padding:14px 18px}
  .deliv-row{grid-template-columns:1fr;gap:6px}
  .kanban-board{grid-template-columns:1fr;gap:10px}
  .cal-cell{min-height:60px;padding:4px}
  .pd-header{padding:18px 20px}
}
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Creative Juice Agency</div>
    <div class="login-sub">Client Portal</div>
    <label class="login-label">Portal PIN</label>
    <input id="pin-input" class="login-input" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="• • • • • •" maxlength="20">
    <button id="login-btn" class="login-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error" class="login-error" style="display:none"></div>
    <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--border);text-align:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">
      Need access? Contact your Creative Juice team.
    </div>
  </div>
</div>

<!-- Portal shell -->
<div id="portal-shell" style="display:none">
  <div class="portal-header">
    <div>
      <div class="portal-brand">Creative Juice Agency</div>
      <div class="portal-brand-sub" id="client-name-hdr">Client Portal</div>
    </div>
    <div class="portal-user">
      <span id="client-welcome"></span>
      <button class="portal-logout" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <!-- Top-level nav -->
  <div id="portal-nav" style="background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:4px">
    <button id="nav-dashboard" onclick="setPage('dashboard')" class="portal-nav-item">Dashboard</button>
    <button id="nav-tasks" onclick="setPage('tasks')" class="portal-nav-item">Tasks</button>
    <button id="nav-calendar" onclick="setPage('calendar')" class="portal-nav-item">Calendar</button>
  </div>
  <div class="portal-content" id="portal-content"></div>
</div>

<script>
const API_BASE='/api';
let state={token:null,client:null,data:null,page:'dashboard',view:'kanban',calMode:'publishing',projectFilter:'',calOffset:0,activeDelivId:null,_dashboardDefaulted:false,_tasksDefaulted:false,_calendarDefaulted:false};

// ── Auth ──
function getToken(){return localStorage.getItem('cja_portal_token');}
function setToken(t){if(t) localStorage.setItem('cja_portal_token',t); else localStorage.removeItem('cja_portal_token');}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  const t=getToken();
  if(t) opts.headers.Authorization='Bearer '+t;
  if(body!==undefined) opts.body=JSON.stringify(body);
  const r=await fetch(API_BASE+path,opts);
  if(!r.ok){
    const err=await r.json().catch(()=>({error:'Request failed'}));
    throw new Error(err.error||'Request failed');
  }
  return r.json();
}

async function doLogin(){
  const pin=document.getElementById('pin-input').value.trim();
  const err=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!pin||pin.length<6){
    err.textContent='Enter your 6+ digit PIN';
    err.style.display='';
    return;
  }
  btn.disabled=true; btn.textContent='Signing in...';
  try{
    const r=await fetch(API_BASE+'/portal/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
    if(!r.ok){
      const e=await r.json().catch(()=>({error:'Invalid PIN'}));
      throw new Error(e.error||'Invalid PIN');
    }
    const data=await r.json();
    setToken(data.token);
    state.token=data.token;
    state.client=data.client;
    await initPortal();
  } catch(e){
    err.textContent=e.message;
    err.style.display='';
  } finally {
    btn.disabled=false; btn.textContent='Sign In';
  }
}

function doLogout(){
  setToken(null);
  location.reload();
}

async function initPortal(){
  try{
    state.data=await api('GET','/portal/data');
    state.client=state.data.client;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('portal-shell').style.display='';
    document.getElementById('client-name-hdr').textContent=state.client.name+' · Projects';
    document.getElementById('client-welcome').textContent='Welcome, '+state.client.name;
    renderHome();
  } catch(e){
    // Token invalid/expired — force re-login
    if(e.message.includes('token')||e.message.includes('auth')){
      setToken(null);
      location.reload();
    } else {
      alert('Failed to load portal: '+e.message);
    }
  }
}

// ── Views ──

const STATUS_LABELS={planned:'Planned',in_progress:'In Progress',in_review:'In Review',published:'Published',cancelled:'Cancelled'};
const TASK_STATUS_LABELS={todo:'To Do',progress:'In Progress',review:'In Review',done:'Done'};

function calcProjectProgress(projectId){
  const delivs=(state.data.deliverables||[]).filter(d=>d.projectId===projectId&&d.status!=='cancelled');
  if(delivs.length===0) return{total:0,completed:0,pct:0};
  const completed=delivs.filter(d=>d.status==='published').length;
  return{total:delivs.length,completed,pct:Math.round(completed/delivs.length*100)};
}

function fmtDate(ds){
  if(!ds) return null;
  return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function fmtRelative(iso){
  if(!iso) return '';
  const diff=Date.now()-new Date(iso).getTime();
  const days=Math.floor(diff/86400000);
  const hours=Math.floor(diff/3600000);
  if(diff<60000) return 'just now';
  if(diff<3600000) return `${Math.floor(diff/60000)}m ago`;
  if(hours<24) return `${hours}h ago`;
  if(days<7) return `${days}d ago`;
  if(days<30) return `${Math.floor(days/7)}w ago`;
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// Effective publish date for a publishable task: explicit publishDate > due date fallback > null.
// Callers MUST check task.publishable first — this function assumes the task qualifies.
function effectivePublishDate(task){
  return task.publishDate||task.due||null;
}

// Effective production date for a deliverable: earliest due date of any linked task
function deliverableProductionDate(deliverable){
  const linkIds=(state.data.taskDeliverables||[]).filter(l=>l.deliverableId===deliverable.id).map(l=>l.taskId);
  const tasks=(state.data.tasks||[]).filter(t=>linkIds.includes(t.id)&&t.due);
  if(tasks.length===0) return null;
  return tasks.reduce((min,t)=>!min||t.due<min?t.due:min,null);
}

// Filter helpers
function getVisibleProjects(){
  const projs=state.data.projects||[];
  return projs.filter(p=>state.projectFilter?p.id===state.projectFilter:true);
}

function getAllProjects(){
  // All projects regardless of status or filter — used for calendar historical view
  return state.data.projects||[];
}

function getFilteredDeliverables(){
  const visibleIds=new Set(getVisibleProjects().map(p=>p.id));
  return (state.data.deliverables||[])
    .filter(d=>visibleIds.has(d.projectId))
    .filter(d=>d.status!=='cancelled');
}

function getFilteredTasks(){
  const visibleIds=new Set(getVisibleProjects().map(p=>p.id));
  return (state.data.tasks||[])
    .filter(t=>visibleIds.has(t.projectId))
    .filter(t=>t.tag!=='admin');
}

function getAllTasks(){
  // All tasks across all projects including completed — used for calendar
  const allProjIds=new Set((state.data.projects||[]).map(p=>p.id));
  return (state.data.tasks||[])
    .filter(t=>allProjIds.has(t.projectId))
    .filter(t=>t.tag!=='admin');
}

// ── Page routing ──

function setPage(page){
  state.page=page;
  state.activeDelivId=null;
  if(page==='calendar') state.calOffset=0; // reset calendar to current month on tab switch
  renderPortal();
}

function renderPortal(){
  ['dashboard','tasks','calendar'].forEach(p=>{
    const el=document.getElementById('nav-'+p);
    if(el) el.classList.toggle('active',state.page===p);
  });

  const projs=state.data.projects||[];
  if(projs.length===0){
    document.getElementById('portal-content').innerHTML=`<div class="empty">
      <div class="empty-title">No projects yet</div>
      <div class="empty-sub">Once your team kicks off a project, it'll appear here.</div>
    </div>`;
    return;
  }

  if(state.page==='dashboard') renderDashboard();
  else if(state.page==='tasks') renderTasksPage();
  else if(state.page==='calendar') renderCalendarPage();
}

// ── Shared filter bar (project + active/complete) ──

function renderFilterBar(extraContent=''){
  const projs=state.data.projects||[];
  // Sort projects: most recent first (by name desc is often month-based — use creation order)
  const sorted=[...projs].sort((a,b)=>{
    // Prefer projects with a start date, sort descending (newest first)
    if(a.startDate&&b.startDate) return b.startDate.localeCompare(a.startDate);
    if(a.startDate) return -1;
    if(b.startDate) return 1;
    return (b.name||'').localeCompare(a.name||'');
  });
  const projectOptions=`<option value="">All Projects</option>`+
    sorted.map(p=>`<option value="${p.id}" ${state.projectFilter===p.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('');
  return`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">Project</span>
      <select onchange="state.projectFilter=this.value;renderPortal()" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;min-width:220px">
        ${projectOptions}
      </select>
    </div>
    ${extraContent}
  </div>`;
}

// Pick the project that best matches the current calendar month
function defaultProjectForCurrentMonth(){
  const projs=state.data.projects||[];
  if(!projs.length) return '';
  const now=new Date();
  const yr=now.getFullYear();
  const mo=now.getMonth(); // 0-indexed
  // Look for a project whose startDate falls in the current month
  const match=projs.find(p=>{
    if(!p.startDate) return false;
    const d=new Date(p.startDate+'T12:00:00');
    return d.getFullYear()===yr && d.getMonth()===mo;
  });
  if(match) return match.id;
  // Fallback: project whose endDate is in current month
  const endMatch=projs.find(p=>{
    if(!p.endDate) return false;
    const d=new Date(p.endDate+'T12:00:00');
    return d.getFullYear()===yr && d.getMonth()===mo;
  });
  if(endMatch) return endMatch.id;
  // Fallback: most recently started active project
  const active=[...projs].filter(p=>p.status!=='complete').sort((a,b)=>{
    if(a.startDate&&b.startDate) return b.startDate.localeCompare(a.startDate);
    return 0;
  });
  return active.length?active[0].id:'';
}

// ── DASHBOARD ──

function renderDashboard(){
  // Auto-select the current month's project on FIRST load only — subsequent manual
  // changes (including back to empty/All) are preserved
  if(!state._dashboardDefaulted){
    state._dashboardDefaulted=true;
    if(!state.projectFilter){
      state.projectFilter=defaultProjectForCurrentMonth();
    }
  }
  const delivs=getFilteredDeliverables();
  const tasks=getFilteredTasks();
  const projs=getVisibleProjects();
  const now=new Date();
  const today=now.toISOString().split('T')[0];

  // Metrics
  const totalDelivs=delivs.length;
  const completed=delivs.filter(d=>d.status==='published').length;
  const overallPct=totalDelivs>0?Math.round(completed/totalDelivs*100):0;
  const inReview=delivs.filter(d=>d.status==='in_review').length;
  // Upcoming publishes: next 14 days
  const in14Days=new Date(now.getTime()+14*86400000).toISOString().split('T')[0];
  const upcomingPublish=delivs.filter(d=>d.publishDate&&d.publishDate>=today&&d.publishDate<=in14Days).length;
  // Upcoming reviews: post-production tasks due in next 14 days, not done
  const upcomingReview=tasks.filter(t=>t.tag==='post-production'&&t.status!=='done'&&t.due&&t.due>=today&&t.due<=in14Days).length;

  // Type breakdown
  const types=state.data.deliverableTypes||[];
  const groups={};
  delivs.forEach(d=>{
    const key=d.typeId||'__untyped__';
    if(!groups[key]){
      const t=types.find(x=>x.id===d.typeId);
      groups[key]={typeName:t?t.name:'Other',items:[]};
    }
    groups[key].items.push(d);
  });
  const groupKeys=Object.keys(groups).sort((a,b)=>groups[a].typeName.localeCompare(groups[b].typeName));

  // Activity feed — 10 most recently-updated deliverables + task-completion events from recent days
  const recentDelivs=[...delivs]
    .filter(d=>d.updatedAt)
    .sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt))
    .slice(0,10);

  // Upcoming to publish: next 5 items with future publish dates
  const publishUpcoming=delivs
    .filter(d=>d.publishDate&&d.publishDate>=today&&d.status!=='published')
    .sort((a,b)=>a.publishDate.localeCompare(b.publishDate))
    .slice(0,5);
  // Upcoming to review: next 5 post-production tasks with future due dates, not done
  const reviewUpcoming=tasks
    .filter(t=>t.tag==='post-production'&&t.status!=='done'&&t.due&&t.due>=today)
    .sort((a,b)=>a.due.localeCompare(b.due))
    .slice(0,5);

  // Edit hours budget usage — show per project that has a budget set
  const projsWithBudget=projs.filter(p=>p.editHoursBudget!=null&&p.editHoursBudget>0);

  const el=document.getElementById('portal-content');
  el.innerHTML=`
    ${renderFilterBar()}

    ${projsWithBudget.length>0?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 22px;margin-bottom:18px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Hours Budget</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${projsWithBudget.map(p=>{
          const used=p.editHoursUsed||0;
          const budget=p.editHoursBudget;
          const pct=budget>0?Math.min(100,Math.round(used/budget*100)):0;
          const over=used>budget;
          const barColor=over?'var(--red)':pct>=85?'var(--amber)':'var(--green)';
          return`<div>
            <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;gap:10px">
              <span style="font-size:12px;color:var(--text);font-weight:500">${escapeHtml(p.name)}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:${over?'var(--red)':'var(--text2)'};font-weight:600">${used.toFixed(1)} / ${budget}h <span style="color:var(--text3);font-weight:400">· ${pct}%${over?' over':''}</span></span>
            </div>
            <div style="height:5px;background:var(--bg4);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.min(pct,100)}%;background:${barColor};border-radius:3px;transition:width .3s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    <!-- Metrics strip -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:26px">
      <div class="metric-card">
        <div class="metric-label">Overall Progress</div>
        <div class="metric-value">${overallPct}<span style="font-size:18px;color:var(--text3);font-weight:500">%</span></div>
        <div style="height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:10px">
          <div style="height:100%;width:${overallPct}%;background:linear-gradient(90deg,var(--amber),var(--green));border-radius:2px"></div>
        </div>
        <div class="metric-sub">${completed} of ${totalDelivs} deliverables published</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">In Review</div>
        <div class="metric-value" style="color:${inReview>0?'var(--blue)':'var(--text)'}">${inReview}</div>
        <div class="metric-sub">awaiting publish / feedback</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Coming Up to Publish</div>
        <div class="metric-value" style="color:${upcomingPublish>0?'var(--amber)':'var(--text)'}">${upcomingPublish}</div>
        <div class="metric-sub">in the next 14 days</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Coming Up to Review</div>
        <div class="metric-value" style="color:${upcomingReview>0?'var(--amber)':'var(--text)'}">${upcomingReview}</div>
        <div class="metric-sub">deliverables you will see soon</div>
      </div>
    </div>

    <!-- Deliverables by type -->
    ${groupKeys.length>0?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:26px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:16px">Progress by Type</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        ${groupKeys.map(gk=>{
          const g=groups[gk];
          const total=g.items.length;
          const done=g.items.filter(x=>x.status==='published').length;
          const pct=total>0?Math.round(done/total*100):0;
          return`<div>
            <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;gap:10px">
              <span style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;color:var(--text);letter-spacing:-0.015em">${escapeHtml(g.typeName)}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);font-weight:600">${done} / ${total} <span style="color:var(--text3)">· ${pct}%</span></span>
            </div>
            <div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${pct>=100?'var(--green)':'var(--amber)'};border-radius:3px;transition:width .3s"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    <!-- Two-column: Upcoming to Review + Upcoming to Publish -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:26px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)">Upcoming to Review</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">when you will see it</span>
        </div>
        ${reviewUpcoming.length===0?`<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:12px;font-style:italic">Nothing currently scheduled for your review</div>`:`
          <div style="display:flex;flex-direction:column;gap:10px">
            ${reviewUpcoming.map(t=>{
              const proj=state.data.projects.find(p=>p.id===t.projectId);
              const linkedDelivId=(state.data.taskDeliverables||[]).find(l=>l.taskId===t.id)?.deliverableId;
              const linkedDeliv=linkedDelivId?(state.data.deliverables||[]).find(d=>d.id===linkedDelivId):null;
              return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amber);letter-spacing:.06em;min-width:56px">${fmtDate(t.due).split(',')[0]}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${linkedDeliv?escapeHtml(linkedDeliv.name):escapeHtml(t.title)}</div>
                  <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${escapeHtml(proj?.name||'')}</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        `}
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)">Upcoming to Publish</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">when it goes live</span>
        </div>
        ${publishUpcoming.length===0?`<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:12px;font-style:italic">No upcoming publish dates scheduled</div>`:`
          <div style="display:flex;flex-direction:column;gap:10px">
            ${publishUpcoming.map(d=>{
              const proj=state.data.projects.find(p=>p.id===d.projectId);
              const type=types.find(t=>t.id===d.typeId);
              return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="_openDelivDrillIn('${d.id}')">
                <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);letter-spacing:.06em;min-width:56px">${fmtDate(d.publishDate).split(',')[0]}</div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(d.name)}</div>
                  <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${escapeHtml(proj?.name||'')}${type?' · '+type.name:''}</div>
                </div>
                <span class="status-chip status-${d.status}">${STATUS_LABELS[d.status]}</span>
              </div>`;
            }).join('')}
          </div>
        `}
      </div>
    </div>

    <!-- Activity feed -->
    ${recentDelivs.length>0?`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px 22px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:14px">Recent Activity</div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${recentDelivs.map(d=>{
          const proj=state.data.projects.find(p=>p.id===d.projectId);
          return`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="_openDelivDrillIn('${d.id}')">
            <span class="status-chip status-${d.status}" style="min-width:95px;text-align:center">${STATUS_LABELS[d.status]}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(d.name)}</div>
              <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px">${escapeHtml(proj?.name||'')}</div>
            </div>
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${fmtRelative(d.updatedAt)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}
  `;
}

function renderDeliverablesPage(){
  const viewTabs=`<div class="view-tabs" style="margin-bottom:0;margin-left:auto">
    <button class="view-tab ${state.view==='list'?'active':''}" onclick="state.view='list';renderPortal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      List
    </button>
    <button class="view-tab ${state.view==='kanban'?'active':''}" onclick="state.view='kanban';renderPortal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="18" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      Kanban
    </button>
    <button class="view-tab ${state.view==='calendar'?'active':''}" onclick="state.view='calendar';renderPortal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Calendar
    </button>
  </div>`;

  // Production/Publishing mode toggle — only shown when calendar view is active
  const modeToggle=state.view==='calendar'?`<div style="display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:8px;border:1px solid var(--border)">
    <button onclick="state.calMode='production';renderPortal()" style="background:${state.calMode==='production'?'var(--bg4)':'transparent'};border:none;color:${state.calMode==='production'?'var(--text)':'var(--text3)'};padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px">Production</button>
    <button onclick="state.calMode='publishing';renderPortal()" style="background:${state.calMode==='publishing'?'var(--bg4)':'transparent'};border:none;color:${state.calMode==='publishing'?'var(--text)':'var(--text3)'};padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px">Publishing</button>
  </div>`:'';

  document.getElementById('portal-content').innerHTML=`
    ${renderFilterBar(modeToggle+viewTabs)}
    <div id="view-body"></div>
  `;
  renderDeliverablesViewBody();
}

function renderDeliverablesViewBody(){
  const body=document.getElementById('view-body');
  if(!body) return;
  const delivs=getFilteredDeliverables();
  if(delivs.length===0){
    body.innerHTML=`<div class="empty">
      <div class="empty-title">No deliverables to show</div>
      <div class="empty-sub">${state.projectFilter?'This project has no deliverables defined yet.':'Your team will add deliverables as projects are planned.'}</div>
    </div>`;
    return;
  }
  if(state.view==='list') renderDelivsList(delivs,body);
  else if(state.view==='kanban') renderDelivsKanban(delivs,body);
  else if(state.view==='calendar') renderDelivsCalendar(delivs,body);
}

function renderDelivsList(delivs,body){
  const types=state.data.deliverableTypes||[];
  const showProject=!state.projectFilter;
  const sorted=[...delivs].sort((a,b)=>{
    if(a.publishDate&&!b.publishDate) return -1;
    if(!a.publishDate&&b.publishDate) return 1;
    if(a.publishDate&&b.publishDate) return a.publishDate.localeCompare(b.publishDate);
    return (a.name||'').localeCompare(b.name||'');
  });
  const cols=showProject?'1fr 160px 140px 120px 150px':'1fr 140px 120px 150px';
  const headers=showProject?['Deliverable','Project','Status','Type','Publish Date']:['Deliverable','Status','Type','Publish Date'];
  body.innerHTML=`<div class="deliv-list">
    <div style="display:grid;grid-template-columns:${cols};gap:14px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border)">
      ${headers.map(h=>`<span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">${h}</span>`).join('')}
    </div>
    ${sorted.map(d=>{
      const type=types.find(t=>t.id===d.typeId);
      const proj=state.data.projects.find(p=>p.id===d.projectId);
      return`<div class="deliv-row" style="grid-template-columns:${cols};cursor:pointer" onclick="_openDelivDrillIn('${d.id}')">
        <div><div class="deliv-name">${escapeHtml(d.name)}</div></div>
        ${showProject?`<div style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(proj?.name||'')}</div>`:''}
        <div><span class="status-chip status-${d.status}">${STATUS_LABELS[d.status]}</span></div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)">${type?.name||'—'}</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:${d.publishDate?'var(--amber)':'var(--text3)'}">${d.publishDate?fmtDate(d.publishDate):'—'}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderDelivsKanban(delivs,body){
  const types=state.data.deliverableTypes||[];
  const cols=[{id:'planned',label:'Planned'},{id:'in_progress',label:'In Progress'},{id:'in_review',label:'In Review'},{id:'published',label:'Published'}];
  body.innerHTML=`<div class="kanban-board">
    ${cols.map(col=>{
      const items=delivs.filter(d=>d.status===col.id);
      return`<div class="kanban-col">
        <div class="kanban-header"><span class="kanban-title">${col.label}</span><span class="kanban-count">${items.length}</span></div>
        ${items.map(d=>{
          const type=types.find(t=>t.id===d.typeId);
          const proj=state.data.projects.find(p=>p.id===d.projectId);
          return`<div class="kanban-card" style="cursor:pointer" onclick="_openDelivDrillIn('${d.id}')">
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">${escapeHtml(d.name)}</div>
            ${!state.projectFilter&&proj?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);margin-bottom:3px">${escapeHtml(proj.name)}</div>`:''}
            <div style="display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)">
              ${type?`<span>${type.name}</span>`:''}
              ${d.publishDate?`<span style="color:var(--amber)">${fmtDate(d.publishDate)}</span>`:''}
            </div>
          </div>`;
        }).join('')||'<div style="color:var(--text3);font-size:11px;text-align:center;padding:16px 0;font-style:italic">—</div>'}
      </div>`;
    }).join('')}
  </div>`;
}

function renderDelivsCalendar(delivs,body){
  const color=state.calMode==='production'?'var(--blue)':'var(--purple)';
  let decorated;
  if(state.calMode==='production'){
    // Production mode: earliest due date of linked tasks for each deliverable
    decorated=delivs
      .map(d=>({...d,__calDate:deliverableProductionDate(d)}))
      .filter(d=>d.__calDate);
  } else {
    // Publishing mode: explicit publish date on the deliverable
    decorated=delivs
      .map(d=>({...d,__calDate:d.publishDate}))
      .filter(d=>d.__calDate);
  }
  renderPortalCalendar(decorated,body,'__calDate',color,d=>{
    const t=(state.data.deliverableTypes||[]).find(x=>x.id===d.typeId);
    return{title:d.name,subtitle:t?.name||'',onClick:`_openDelivDrillIn('${d.id}')`};
  });
}

function renderTasksPage(){
  // Auto-select the current month's project on FIRST load of the tasks page only
  if(!state._tasksDefaulted){
    state._tasksDefaulted=true;
    if(!state.projectFilter){
      state.projectFilter=defaultProjectForCurrentMonth();
    }

      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="18" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      Kanban
    </button>
    <button class="view-tab ${state.view==='list'?'active':''}" onclick="state.view='list';renderPortal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
      List
    </button>
  </div>`;

  document.getElementById('portal-content').innerHTML=`
    ${renderFilterBar(viewTabs)}

}

function renderTasksViewBody(){
  const body=document.getElementById('view-body');
  if(!body) return;
  const tasks=getFilteredTasks();
  if(tasks.length===0){
    body.innerHTML=`<div class="empty">
      <div class="empty-title">No tasks to show</div>
      <div class="empty-sub">Your team's pipeline will appear here.</div>
    </div>`;
    return;
  }
  if(state.view==='list') renderTasksList(tasks,body);
  else renderTasksKanban(tasks,body);
}

function renderTasksList(tasks,body){
  const showProject=!state.projectFilter;
  const sorted=[...tasks].sort((a,b)=>{
    if(a.due&&!b.due) return -1;
    if(!a.due&&b.due) return 1;
    if(a.due&&b.due) return a.due.localeCompare(b.due);
    return (a.title||'').localeCompare(b.title||'');
  });
  const cols=showProject?'1fr 160px 120px 130px 130px':'1fr 120px 130px 130px';
  const headers=showProject?['Task','Project','Status','Due Date','Publish Date']:['Task','Status','Due Date','Publish Date'];
  body.innerHTML=`<div class="deliv-list">
    <div style="display:grid;grid-template-columns:${cols};gap:14px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border)">
      ${headers.map(h=>`<span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">${h}</span>`).join('')}
    </div>
    ${sorted.map(t=>{
      const proj=state.data.projects.find(p=>p.id===t.projectId);
      const statusClass=t.status==='done'?'status-published':t.status==='review'?'status-in_review':t.status==='progress'?'status-in_progress':'status-planned';
      return`<div class="deliv-row" style="grid-template-columns:${cols}">
        <div><div class="deliv-name">${escapeHtml(t.title)}</div></div>
        ${showProject?`<div style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(proj?.name||'')}</div>`:''}
        <div><span class="status-chip ${statusClass}">${TASK_STATUS_LABELS[t.status]||t.status}</span></div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:${t.due?'var(--text2)':'var(--text3)'}">${t.due?fmtDate(t.due):'—'}</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:${t.publishDate?'var(--amber)':(t.due?'var(--text3)':'var(--text3)')}">${t.publishDate?fmtDate(t.publishDate):(t.due?fmtDate(t.due)+' <span style="opacity:0.5">(due)</span>':'—')}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTasksKanban(tasks,body){
  const cols=[{id:'todo',label:'To Do'},{id:'progress',label:'In Progress'},{id:'review',label:'In Review'},{id:'done',label:'Done'}];
  body.innerHTML=`<div class="kanban-board">
    ${cols.map(col=>{
      const items=tasks.filter(t=>t.status===col.id);
      return`<div class="kanban-col">
        <div class="kanban-header"><span class="kanban-title">${col.label}</span><span class="kanban-count">${items.length}</span></div>
        ${items.map(t=>{
          const proj=state.data.projects.find(p=>p.id===t.projectId);
          return`<div class="kanban-card">
            <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">${escapeHtml(t.title)}</div>
            ${!state.projectFilter&&proj?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);margin-bottom:3px">${escapeHtml(proj.name)}</div>`:''}
            <div style="display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)">
              ${t.due?`<span>${fmtDate(t.due)}</span>`:''}
            </div>
          </div>`;
        }).join('')||'<div style="color:var(--text3);font-size:11px;text-align:center;padding:16px 0;font-style:italic">—</div>'}
      </div>`;
    }).join('')}
  </div>`;
}

// ── CALENDAR PAGE (standalone tab — production + publishing, all projects including completed) ──

function renderCalendarPage(){
  // On FIRST load of the calendar page, default to 'All Projects' (empty filter).
  // Subsequent manual changes are preserved.
  if(!state._calendarDefaulted){
    state._calendarDefaulted=true;
    state.projectFilter='';
  }

  const modeToggle=`<div style="display:flex;gap:2px;background:var(--bg2);padding:3px;border-radius:8px;border:1px solid var(--border)">
    <button onclick="state.calMode='production';renderPortal()" style="background:${state.calMode==='production'?'var(--bg4)':'transparent'};border:none;color:${state.calMode==='production'?'var(--text)':'var(--text3)'};padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px">Production</button>
    <button onclick="state.calMode='publishing';renderPortal()" style="background:${state.calMode==='publishing'?'var(--bg4)':'transparent'};border:none;color:${state.calMode==='publishing'?'var(--text)':'var(--text3)'};padding:6px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:6px">Publishing</button>
  </div>`;

  // Calendar uses ALL tasks — ignore project completion status so clients can see historical data
  // Still respect the project filter dropdown if a specific project is chosen
  const allTasks=getAllTasks();
  const tasks=state.projectFilter
    ? allTasks.filter(t=>t.projectId===state.projectFilter)
    : allTasks;

  // Build project options from ALL projects (not just active)
  const allProjs=getAllProjects();
  const sorted=[...allProjs].sort((a,b)=>{
    if(a.startDate&&b.startDate) return b.startDate.localeCompare(a.startDate);
    return (b.name||'').localeCompare(a.name||'');
  });
  const projectOptions=`<option value="">All Projects</option>`+
    sorted.map(p=>`<option value="${p.id}" ${state.projectFilter===p.id?'selected':''}>${escapeHtml(p.name)}${p.status==='complete'?' · completed':''}</option>`).join('');
  const filterBar=`<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)">Project</span>
      <select onchange="state.projectFilter=this.value;renderPortal()" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;min-width:220px">
        ${projectOptions}
      </select>
    </div>
    ${modeToggle}
  </div>`;

  document.getElementById('portal-content').innerHTML=`
    ${filterBar}
    <div id="cal-body"></div>
  `;

  const body=document.getElementById('cal-body');
  const color=state.calMode==='publishing'?'var(--amber)':'var(--blue)';
  let decorated;
  if(state.calMode==='publishing'){
    // Only show tasks explicitly tagged as publishable
    decorated=tasks.filter(t=>t.publishable).map(t=>({...t,__calDate:effectivePublishDate(t)})).filter(t=>t.__calDate);
  } else {
    decorated=tasks.filter(t=>t.tag!=='admin').map(t=>({...t,__calDate:t.due})).filter(t=>t.__calDate);
  }
  renderPortalCalendar(decorated,body,'__calDate',color,t=>{
    const proj=(state.data.projects||[]).find(p=>p.id===t.projectId);
    return{title:t.title,subtitle:proj?.name||'',onClick:null};
  });
}

// ── Shared calendar renderer ──

function renderPortalCalendar(items,body,dateField,accentColor,extractInfo){
  const now=new Date();
  state.calOffset=state.calOffset||0;
  const base=new Date(now.getFullYear(),now.getMonth()+state.calOffset,1);
  const yr=base.getFullYear(),mo=base.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=new Date(yr,mo,1).getDay();
  const ts=now.toISOString().split('T')[0];
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const monthPrefix=`${yr}-${String(mo+1).padStart(2,'0')}`;
  const thisMonth=items.filter(x=>x[dateField]&&x[dateField].startsWith(monthPrefix));
  const byDate={};
  thisMonth.forEach(x=>{
    const d=x[dateField];
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(x);
  });

  let cells='';
  const prevDim=new Date(yr,mo,0).getDate();
  for(let i=0;i<fd;i++) cells+=`<div class="cal-cell other"><div class="cal-daynum">${prevDim-fd+i+1}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=ds===ts;
    const itemsForDay=byDate[ds]||[];
    cells+=`<div class="cal-cell${isToday?' today':''}">
      <div class="cal-daynum${isToday?' today':''}">${d}</div>
      ${itemsForDay.map(x=>{
        const info=extractInfo(x);
        const clickAttr=info.onClick?`onclick="${info.onClick}" style="cursor:pointer"`:'';
        return`<div ${clickAttr} style="background:${accentColor==='var(--purple)'?'rgba(149,97,226,0.18)':accentColor==='var(--amber)'?'rgba(212,166,90,0.16)':'rgba(102,126,234,0.16)'};border-left:2px solid ${accentColor};border-radius:4px;padding:4px 6px;margin-bottom:3px" title="${escapeHtml(info.title)}${info.subtitle?' — '+escapeHtml(info.subtitle):''}">
          <div style="font-family:'DM Mono',monospace;font-size:9px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(info.title)}</div>
          ${info.subtitle?`<div style="font-size:8px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(info.subtitle)}</div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }
  const rem=(fd+dim)%7===0?0:7-(fd+dim)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="cal-cell other"><div class="cal-daynum">${i}</div></div>`;

  // Find next month with items if this month is empty
  const allDates=items.map(x=>x[dateField]).filter(Boolean).sort();
  const futureDates=allDates.filter(d=>d>=ts);
  let emptyHint='';
  if(thisMonth.length===0&&futureDates.length>0){
    const nextDate=futureDates[0];
    const nextLabel=new Date(nextDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',year:'numeric'});
    // Compute offset to that month
    const tgt=new Date(nextDate+'T12:00:00');
    const targetOffset=(tgt.getFullYear()-now.getFullYear())*12+(tgt.getMonth()-now.getMonth());
    emptyHint=`<div style="padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg2);border:1px dashed var(--border);border-radius:10px;margin-top:14px">
      <div style="margin-bottom:8px">Nothing scheduled for ${MONTHS[mo]} ${yr}</div>
      <button onclick="state.calOffset=${targetOffset};renderPortal()" style="background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 14px;border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer">Jump to ${nextLabel} →</button>
    </div>`;
  } else if(thisMonth.length===0&&allDates.length===0){
    emptyHint=`<div style="padding:40px 20px;text-align:center;color:var(--text3);font-size:13px;background:var(--bg2);border:1px dashed var(--border);border-radius:10px;margin-top:14px;font-style:italic">
      No ${dateField==='publishDate'||dateField==='__calDate'?'publish or due':'due'} dates scheduled yet
    </div>`;
  }

  body.innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
      <button class="back-link" onclick="state.calOffset=(state.calOffset||0)-1;renderPortal()" style="margin:0">‹ Prev</button>
      <span style="font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.02em">${MONTHS[mo]} ${yr}</span>
      <button class="back-link" onclick="state.calOffset=(state.calOffset||0)+1;renderPortal()" style="margin:0">Next ›</button>
      ${state.calOffset!==0?`<button class="back-link" onclick="state.calOffset=0;renderPortal()" style="margin:0">Today</button>`:''}
      <div style="margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${thisMonth.length} ${dateField==='publishDate'?'publishing':dateField==='__calDate'?'scheduled':'due'} this month</div>
    </div>
    <div class="cal-grid">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-head">${d}</div>`).join('')}
      ${cells}
    </div>
    ${emptyHint}
  `;
}

// ── DELIVERABLE DRILL-IN MODAL ──

function _openDelivDrillIn(delivId){
  const d=(state.data.deliverables||[]).find(x=>x.id===delivId);
  if(!d) return;
  const proj=state.data.projects.find(p=>p.id===d.projectId);
  const type=(state.data.deliverableTypes||[]).find(t=>t.id===d.typeId);
  const linkedTaskIds=(state.data.taskDeliverables||[]).filter(l=>l.deliverableId===delivId).map(l=>l.taskId);
  const linkedTasks=(state.data.tasks||[]).filter(t=>linkedTaskIds.includes(t.id));

  // Remove any existing modal
  document.getElementById('deliv-modal-backdrop')?.remove();

  const modal=document.createElement('div');
  modal.id='deliv-modal-backdrop';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)';
  modal.onclick=(e)=>{if(e.target===modal) modal.remove();};
  modal.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
      <div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">${escapeHtml(proj?.name||'')}${type?' · '+escapeHtml(type.name):''}</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:600;color:var(--text);letter-spacing:-0.02em">${escapeHtml(d.name)}</div>
      </div>
      <button onclick="document.getElementById('deliv-modal-backdrop').remove()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:4px;line-height:1">✕</button>
    </div>
    <div style="padding:22px 26px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px">
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Status</div>
          <span class="status-chip status-${d.status}">${STATUS_LABELS[d.status]}</span>
        </div>
        ${d.publishDate?`<div>
          <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Publish Date</div>
          <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--amber)">${fmtDate(d.publishDate)}</div>
        </div>`:''}
        <div>
          <div style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Tasks</div>
          <div style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text2)">${linkedTasks.filter(t=>t.status==='done').length} / ${linkedTasks.length} done</div>
        </div>
      </div>

      <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Task Pipeline</div>
      ${linkedTasks.length===0?`<div style="padding:18px;text-align:center;color:var(--text3);font-size:12px;font-style:italic;background:var(--bg3);border-radius:8px">No tasks linked yet</div>`:`
        <div style="display:flex;flex-direction:column;gap:8px">
          ${linkedTasks.map(t=>{
            const statusClass=t.status==='done'?'status-published':t.status==='review'?'status-in_review':t.status==='progress'?'status-in_progress':'status-planned';
            return`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:12px">
              <span class="status-chip ${statusClass}" style="min-width:95px;text-align:center;flex-shrink:0">${TASK_STATUS_LABELS[t.status]||t.status}</span>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(t.title)}</div>
                ${t.due?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:2px">Due ${fmtDate(t.due)}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      `}
    </div>
  </div>`;
  document.body.appendChild(modal);
}

// Backwards-compat shims
function renderHome(){renderPortal();}
function openProject(pid){state.projectFilter=pid;renderPortal();}
function setView(v){state.view=v;renderPortal();}
function renderCurrentView(){renderPortal();}
function renderProjectView(){renderPortal();}
function renderProject(){renderPortal();}

function escapeHtml(str){
  return String(str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Auto-login if token exists ──
(async()=>{
  const t=getToken();
  if(t){
    state.token=t;
    try{ await initPortal(); } catch(e){ setToken(null); }
  }
  // Enter-to-submit
  const pinInput=document.getElementById('pin-input');
  if(pinInput){
    pinInput.addEventListener('keypress',e=>{if(e.key==='Enter') doLogin();});
    pinInput.focus();
  }
})();
</script>
